# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml
#
# CE FICHIER EST VOLONTAIREMENT INCOMPLET.
# Votre mission : définir les 3 services qui composent l'application.
#
# Services attendus :
#
#   mongo    → image officielle mongo:7
#              port 27017 exposé
#              volume persistant pour les données
#
#   backend  → build depuis ./backend
#              port 8000 exposé
#              variables d'environnement : MONGO_URL, SECRET_KEY
#              dépend de : mongo
#
#   frontend → build depuis ./frontend
#              port 80 exposé
#              dépend de : backend
#
#   Indice : 
#     vous aurez besoin d'un volume pour Mongo, mais pas pour les autres services.
#     vous aurez aussi besoin de la directive "depends_on" pour gérer l'ordre de démarrage des services.
#
# Rappel : les variables sensibles (SECRET_KEY) ne doivent pas être
# écrites en dur ici — utilisez un fichier .env (voir .env.example)
# ─────────────────────────────────────────────────────────────────────────────

# Orchestre les conteneurs MongoDB, backend et frontend
services:

  # Service MongoDB
  mongo:
    image: mongo:7 # Utilise l'image officielle MongoDB
    ports:
      - "27017:27017" # Exporte le port 27017
    volumes:
      - mongo-data:/data/db # Volume persistant pour les données

  # Service Backend
  backend:
    build: ./backend # Build depuis le dossier ./backend
    ports:
      - "8000:8000" # Exporte le port 8000
    env_file:
      - .env # Variables d'environnement
    depends_on:
      - mongo

  # Service Frontend
  frontend:
    build: ./frontend # Build depuis le dossier ./frontend
    ports:
      - "80:80" # Exporte le port 80
    depends_on:
      - backend

# Volume pour les données MongoDB
volumes:
  mongo-data:
